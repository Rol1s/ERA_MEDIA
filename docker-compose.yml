services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: era_media
      POSTGRES_USER: era
      POSTGRES_PASSWORD: era
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U era -d era_media"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://era:era@postgres:5432/era_media
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:3000,http://frontend:3000}
      DEV_MODE: ${DEV_MODE:-true}
      APP_SECRET_KEY: ${APP_SECRET_KEY:-}
    ports:
      - "${BIND_HOST:-127.0.0.1}:${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             python -m app.seed &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 12

  worker:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://era:era@postgres:5432/era_media
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      APP_SECRET_KEY: ${APP_SECRET_KEY:-}
    depends_on:
      backend:
        condition: service_healthy
    command: celery -A app.workers.celery_app worker --loglevel=INFO

  scheduler:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://era:era@postgres:5432/era_media
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      APP_SECRET_KEY: ${APP_SECRET_KEY:-}
    depends_on:
      backend:
        condition: service_healthy
    command: celery -A app.workers.celery_app beat --loglevel=INFO

  frontend:
    build:
      context: ./frontend
    environment:
      INTERNAL_API_URL: http://backend:8000
    ports:
      - "${BIND_HOST:-127.0.0.1}:${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
